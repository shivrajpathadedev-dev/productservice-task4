<mat-card class="mt-3">
    <div>
        <h3 class="text-center p-3 bg-primary">{{isInEditMode ? 'Update Product' : 'Add Product'}}</h3>
        <form #ProductForm="ngForm" (ngSubmit)="onproductsubmit()">
            <div class="mb-3">
                <label for="title" class="form-label fw-semibold">Product Title</label>
                <input type="text" ngModel #title="ngModel" name="title" required class="form-control">
            </div>
                <div class="mb-3">
                <label for="price" class="form-label fw-semibold"> Price</label>
                <input type="text" ngModel #price="ngModel" name="price" required class="form-control">
            </div>
                <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Description</label>
                <textarea type="text" rows="3" ngModel #description="ngModel" name="description" required class="form-control"></textarea>
            </div>
              <div class="mb-3">
                <label for="category" class="form-label fw-semibold"> Category</label>
                <input type="text" ngModel #category="ngModel" name="category" required class="form-control">
            </div>
              <div class="mb-3">
                <label for="image" class="form-label fw-semibold">Image URL</label>
                <input type="url" ngModel #image="ngModel" name="image" required class="form-control">
            </div>
            <div class="d-flex justify-content-between">
                <button *ngIf="!isInEditMode" mat-raised-button color="primary" class="w-100">Add Product</button>
                <button (click)="onUpdate()" *ngIf="isInEditMode" mat-raised-button color="primary" class="w-100">Update Product</button>
            </div>
        </form>
    </div>
</mat-card>
